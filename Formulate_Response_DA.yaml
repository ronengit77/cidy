          actions:
            - kind: SetTextVariable
              id: 7XENFr
              variable: Global.sourceUseInstructions
              value: |-
                Use the Evaluation knowledge folder.

                When a document is tranche-labeled, use the highest tranche number unless the user explicitly asks about an earlier tranche.

                Use non-tranche general evaluation documents where they apply across tranches.

                Use guidance notes and annotated templates as primary sources for substantive answers.

                Do not use unannotated templates unless the user specifically asks for a blank template or template structure.

                The DA guidance note on terminal evaluation of joint projects v1 is relevant from T12 onward.

                The DA project evaluation report template 02-2026 and DA suggested management response template 02-2026 are relevant from T15 onward.

            - kind: SearchAndSummarizeContent
              id: NWnG1Y
              autoSend: false
              variable: Global.draftResponse
