kind: AdaptiveDialog
modelDescription: Reusable next-step menu after feedback or escalation. It offers context-aware choices to ask another question, retry with wider knowledge, escalate, or close.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ConditionGroup
      id: conditionGroup_nextActionPromptByContext
      conditions:
        - id: conditionItem_postEscalation
          condition: =Global.nextActionContext = "post_escalation"
          actions:
            - kind: Question
              id: question_nextAction_postEscalation
              interruptionPolicy:
                allowInterruption: true

              variable: Topic.nextActionChoicePostEscalation
              prompt: Your inquiry has been escalated. What would you like to do next?
              entity:
                kind: EmbeddedEntity
                sensitivityLevel: None
                definition:
                  kind: ClosedListEntity
                  items:
                    - id: Ask another question
                      displayName: Ask another question

                    - id: Try again (with wider knowledgebase)
                      displayName: Try again (with wider knowledgebase)

                    - id: Close the conversation
                      displayName: Close the conversation

            - kind: SetVariable
              id: log_nextActionPrompt_postEscalation
              variable: Global.transcript
              value: |
                =Global.transcript & "CIDY: " & "Your inquiry has been escalated. What would you like to do next?" & Char(13) & Char(10) & Char(13) & Char(10)

            - kind: SetVariable
              id: log_nextActionAnswer_postEscalation
              variable: Global.transcript
              value: |
                =Global.transcript & "USER: " & Text(Topic.nextActionChoicePostEscalation) & Char(13) & Char(10) & Char(13) & Char(10)

            - kind: SetVariable
              id: set_nextAction_postEscalation
              variable: Global.askAnother
              value: |
                =Switch(
                  Text(Topic.nextActionChoicePostEscalation),
                  "Ask another question", "yes",
                  "Try again (with wider knowledgebase)", "retry_wide",
                  "Close the conversation", "no",
                  "unknown"
                )

      elseActions:
        - kind: Question
          id: question_nextAction_feedback
          interruptionPolicy:
            allowInterruption: true

          variable: Topic.nextActionChoiceFeedback
          prompt: What would you like to do next?
          entity:
            kind: EmbeddedEntity
            sensitivityLevel: None
            definition:
              kind: ClosedListEntity
              items:
                - id: Ask another question
                  displayName: Ask another question

                - id: Try again (with wider knowledgebase)
                  displayName: Try again (with wider knowledgebase)

                - id: Escalate to a human
                  displayName: Escalate to a human

                - id: Close the session
                  displayName: Close the session

        - kind: SetVariable
          id: log_nextActionPrompt_feedback
          variable: Global.transcript
          value: |
            =Global.transcript & "CIDY: " & "What would you like to do next?" & Char(13) & Char(10) & Char(13) & Char(10)

        - kind: SetVariable
          id: log_nextActionAnswer_feedback
          variable: Global.transcript
          value: |
            =Global.transcript & "USER: " & Text(Topic.nextActionChoiceFeedback) & Char(13) & Char(10) & Char(13) & Char(10)

        - kind: SetVariable
          id: set_nextAction_feedback
          variable: Global.askAnother
          value: |
            =Switch(
              Text(Topic.nextActionChoiceFeedback),
              "Ask another question", "yes",
              "Try again (with wider knowledgebase)", "retry_wide",
              "Escalate to a human", "escalate",
              "Close the session", "no",
              "unknown"
            )

    - kind: ConditionGroup
      id: conditionGroup_nextAction
      conditions:
        - id: condition_askAnother
          condition: =Global.askAnother = "yes"
          actions:
            - kind: SetVariable
              id: clear_nextActionContext_newQuestion
              variable: Global.nextActionContext
              value:

            - kind: SetVariable
              id: clear_fundingStream
              variable: Global.fundingStream
              value: =Blank()

            - kind: SetVariable
              id: clear_topicArea
              variable: Global.topicArea
              value: =Blank()

            - kind: SetVariable
              id: clear_draftResponse
              variable: Global.draftResponse
              value: =Blank()

            - kind: SetVariable
              id: clear_sourceUseInstructions
              variable: Global.sourceUseInstructions
              value: =Blank()

            - kind: Question
              id: question_newInput
              interruptionPolicy:
                allowInterruption: false

              variable: Topic.newQuestion
              prompt: Of course. Please type your next question.
              entity:
                kind: StringPrebuiltEntity
                sensitivityLevel: None

            - kind: SetVariable
              id: set_globalQuestion
              variable: Global.userQuestion
              value: =Topic.newQuestion

            - kind: SetVariable
              id: log_newQuestionPrompt
              variable: Global.transcript
              value: |
                =Global.transcript & "CIDY: " & "Of course. Please type your next question." & Char(13) & Char(10) & Char(13) & Char(10)

            - kind: SetVariable
              id: log_newQuestionAnswer
              variable: Global.transcript
              value: |
                =Global.transcript & "USER: " & Topic.newQuestion & Char(13) & Char(10) & Char(13) & Char(10)

            - kind: BeginDialog
              id: goToIntentDirect
              dialog: copilots_header_3141e.topic.Intent_c8W

        - id: condition_tryAgainWide
          condition: =Global.askAnother = "retry_wide"
          actions:
            - kind: SetVariable
              id: clear_nextActionContext_retry
              variable: Global.nextActionContext
              value:

            - kind: SetVariable
              id: set_retryMode_wideKnowledge
              variable: Global.retryMode
              value: wide_knowledge

            - kind: SetVariable
              id: clear_draftResponse_retry
              variable: Global.draftResponse
              value: =Blank()

            - kind: SetVariable
              id: clear_formattedAnswer_retry
              variable: Global.formattedAnswer
              value: =Blank()

            - kind: SetVariable
              id: clear_formattedSources_retry
              variable: Global.formattedSources
              value: =Blank()

            - kind: SetVariable
              id: clear_confidenceScore_retry
              variable: Global.confidenceScore
              value: =Blank()

            - kind: SetVariable
              id: clear_confidenceLabel_retry
              variable: Global.confidenceLabel
              value: =Blank()

            - kind: SetVariable
              id: clear_warningMessage_retry
              variable: Global.warningMessage
              value: =Blank()

            - kind: SetVariable
              id: log_retryWide
              variable: Global.transcript
              value: |
                =Global.transcript & "CIDY: " & "Trying again with the wider Knowledge base." & Char(13) & Char(10) & Char(13) & Char(10)

            - kind: BeginDialog
              id: goToWideKnowledgeRetry
              dialog: copilots_header_3141e.topic.FormulateResponse

        - id: condition_escalate
          condition: =Global.askAnother = "escalate"
          actions:
            - kind: SetVariable
              id: clear_nextActionContext_escalate
              variable: Global.nextActionContext
              value:

            - kind: BeginDialog
              id: goToEscalate
              dialog: copilots_header_3141e.topic.Escalate

        - id: condition_close
          condition: =Global.askAnother = "no"
          actions:
            - kind: SetVariable
              id: clear_nextActionContext_close
              variable: Global.nextActionContext
              value:

            - kind: SendActivity
              id: msg_close
              activity: Thank you. The conversation is now closed.

            - kind: SetVariable
              id: log_close
              variable: Global.transcript
              value: |
                =Global.transcript & "CIDY: " & "Thank you. The conversation is now closed." & Char(13) & Char(10) & Char(13) & Char(10)

            - kind: EndDialog
              id: end_close

      elseActions:
        - kind: SendActivity
          id: msg_fallback
          activity: I could not determine what you would like to do next. Please start a new question or request human follow-up.

        - kind: EndDialog
          id: end_fallback

inputType: {}
outputType: {}
