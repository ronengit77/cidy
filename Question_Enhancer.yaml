kind: AdaptiveDialog
modelDescription: Enhances a finalized user question with search hints before routing. It does not classify, clarify, route, search knowledge sources, or answer the user.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ConditionGroup
      id: conditionGroup_enhanceOnlyReadyQuestions
      conditions:
        - id: conditionItem_readyToRoute
          condition: =Global.intentStatus = "ready_to_route"
          actions:
            - kind: InvokeAIBuilderModelAction
              id: invokeAIBuilderModelAction_questionEnhancer
              input:
                binding:
                  UserQuestion: |
                    ="You are the Cidy Question Enhancer. Enrich the finalized user question with search metadata before routing and retrieval. Do not answer, classify, route, change existing intent variables, or ask follow-up questions. Do not invent facts, dates, policies, counts, meetings, or document titles. Return ONLY compact valid JSON. No markdown, prose, comments, or code fences." & Char(10) & Char(10) & "Return this exact JSON schema. Every value must be a string. Use empty string when not applicable: {""detected_entities"":"""",""detected_dates"":"""",""recency_intent"":"""",""expanded_acronyms"":"""",""disambiguation_notes"":"""",""synonyms_and_search_terms"":"""",""filters"":"""",""source_selection_hints"":"""",""retrieval_strategy"":"""",""confidence_cautions"":""""}" & Char(10) & Char(10) & "Field rules: detected_entities=countries, regions, divisions, funds, tranches, projects, report types, meetings, document types, or named bodies explicitly mentioned or strongly implied. detected_dates=explicit years, ranges, relative dates, versions, tranches, meeting dates, or words like latest/current/previous/historical. recency_intent=latest/current, historical, comparative, date-bounded, or no specific recency. expanded_acronyms=expand only if useful for retrieval. disambiguation_notes=note ambiguity without resolving it as fact. synonyms_and_search_terms=add retrieval terms likely to appear in source documents. filters=suggest metadata filters such as fund, year, tranche, country, division, document type, meeting type, count, or list. source_selection_hints=suggest preferred evidence type, not a route. retrieval_strategy=suggest how to search, compare, count, or prioritize evidence. confidence_cautions=warn about recency, incomplete coverage, acronym ambiguity, count accuracy, or policy changes." & Char(10) & Char(10) & "Acronym guidance: DA=Development Account; RPTC=Regular Programme of Technical Cooperation; XB=Extra-budgetary; CD=Capacity Development; CDPMO=Capacity Development Programme Management Office; TAG=Capacity Development Tag Team only for CDPMO/DESA governance, meetings, decisions, or coordination; PDF or UNPDF may mean Peace and Development Trust Fund when about funding streams, projects, or UN trust funds, otherwise PDF may mean document format." & Char(10) & Char(10) & "Recency guidance: latest/most recent/newest/current/updated means prefer newest approved or dated source; current policy/guidance means prioritize newest official guidance and caution that older sources may be superseded; previous/prior/historical/past means search older sources and do not assume current validity; in YEAR means prioritize that year; since YEAR means that year onward; before YEAR means earlier than that year; after YEAR means later than that year." & Char(10) & Char(10) & "Useful search terms: evaluation=evaluation report; project evaluation; terminal evaluation; lessons learned; recommendations; management response. project design=concept note; project document; prodoc; theory of change; results framework; logframe; workplan; budget. monitoring/reporting=progress report; annual progress report; implementation report; results reporting; indicators; milestones. governance/process=approval; clearance; steering committee; TAG meeting; decision; minutes; guidance note; SOP; workflow. funding=DA; Development Account; RPTC; Regular Programme of Technical Cooperation; XB; extra-budgetary; trust fund." & Char(10) & Char(10) & "Count/list guidance: If the user asks how many, count, list, all, show me, which projects, which countries, or how often, mark this in filters and retrieval_strategy. For counts, prefer structured records when available rather than narrative-only retrieval. Add a caution when complete coverage depends on the index, log, or metadata quality." & Char(10) & Char(10) & "Existing finalized intent variables:" & Char(10) & "knowledge_domain: " & Global.knowledgeDomain & Char(10) & "funding_stream: " & Global.fundingStream & Char(10) & "topic_area: " & Global.topicArea & Char(10) & "clarification_answer: " & Global.clarificationAnswer & Char(10) & Char(10) & "Finalized user question:" & Char(10) & Global.userQuestion

              output:
                binding:
                  predictionOutput: Topic.enhancerResult

              aIModelId: 9ef6e25f-8234-4658-9c83-e711c57f7258

            - kind: SetVariable
              id: setQuestionEnhancements
              variable: Global.executiveQuestionEnhancements
              value: =Text(Topic.enhancerResult.text)

            - kind: SendActivity
              id: sendActivity_debug_questionEnhancer
              activity: "DEBUG - Question Enhancer: {Global.executiveQuestionEnhancements}"

      elseActions:
        - kind: SetVariable
          id: clearQuestionEnhancementsNotReady
          variable: Global.executiveQuestionEnhancements
          value:

    - kind: BeginDialog
      id: goToRouter
      dialog: copilots_header_3141e.topic.Intent-Router

    - kind: EndDialog
      id: endQuestionEnhancer

inputType: {}
outputType: {}
