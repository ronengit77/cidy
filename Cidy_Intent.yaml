    - kind: ConditionGroup
      id: conditionGroup_setIntentStatus
      conditions:
        - id: conditionItem_statusOutOfScope
          condition: =Global.knowledgeDomain = "out_of_scope"
          actions:
            - kind: SetVariable
              id: setStatus_outOfScope
              variable: Global.intentStatus
