            - kind: SetVariable
              id: setRequiresNo_outOfScope
              variable: Global.requiresClarification
              value: No

        - id: conditionItem_statusNeedsClarification
          condition: =Global.requiresClarification = "Yes"
          actions:
            - kind: SetVariable
              id: setStatus_needsClarification
              variable: Global.intentStatus
              value: needs_clarification

        - id: conditionItem_statusReadyToRoute
          condition: =Global.requiresClarification = "No"
          actions:
