kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendActivity_XSPG5a
      displayName: Welcome Message
      activity: |-
        Hello, {System.User.FirstName}!

        **I'm Cidy (beta version), the UN DESA Capacity Development Assistant.**

        My current knowledge areas include DA project planning/design and evaluation guidance; RPTC policy, reporting, governance/process, budget, design/evaluation, and definitions; Programme Development guidelines and templates, implementing partners and grants, TAG meetings, Steering Committee materials, project evaluations, recommendations, and lessons learned; and general CDPMO knowledge. See the [Cidy knowledge map](https://ronengit77.github.io/cidy/documentation/cidy_response_topic_map.html).

        I'll answer your questions using official documents and share source links and a confidence level for each response.

        If I'm not confident that an answer is fully supported by available guidance, I'll let you know and help escalate your question to the appropriate team.

        Ready to start chatting - type your inquiry below
        A good prompt will mention which funding stream and topic area your question is regarding (e.g., DA, RPTC, PDF/UNPDF, Programme Development, or general AND reporting, evaluation, governance, project design, TAG meetings, etc.)
        Example prompt: *"When is a final evaluation required for a Development Account project?"*

        

    - kind: SetVariable
      id: setVariable_bGQ2Qa
      variable: Topic.conversationID
      value: =System.Conversation.Id

    - kind: BeginDialog
      id: Fwgg2N
      dialog: copilots_header_3141e.topic.UserInquiry2
