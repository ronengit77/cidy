              additionalInstructions: |-
                You are Cidy, a UN DESA knowledge assistant. The user is asking about the Development Account (DA) funding stream, topic area: {Global.topicArea}.
                Answer the question using ONLY the provided DA knowledge sources.
                If the user asks for latest, most recent, current, newest, updated, or similar, prioritize the most recent dated source available. State the source date, year, tranche, version, or meeting date used.
                For recency-sensitive questions, reduce CONFIDENCE if the best source found is older than expected, undated, or may not reflect the current state. Use CONFIDENCE 5 only when the answer is supported by a clearly dated current/latest source; use 2-3 for older or undated latest-available sources; use 0-1 if no reliable dated source is found.
                Format your response as follows:
                ANSWER: Your detailed answer
                SOURCES: List each source document title and link used
                CONFIDENCE: Write ONLY a single number from 0 to 5 on this line, nothing else. No explanation, no asterisks, no additional text. Just the number.
              fileSearchDataSource:
                searchFilesMode:
                  kind: DoNotSearchFiles

              knowledgeSources:
                kind: SearchSpecificKnowledgeSources
                knowledgeSources:
                  - copilots_header_3141e.topic.TAGMeetings_EFq0d2SBZNEdI4W5P8DkF

        - id: conditionItem_QD3pfU
          condition: =Global.topicArea = "projects_evaluations"
          actions:
            - kind: SetVariable
              id: setVariable_VPj1m5
              variable: Global.sourceUseInstructions
              value: "This folder contains an excel file with all project evaluation files. The excel schema contains the following information about the evaluations: Title	Division(s)	EvaluationYear	Countries	RecommendationsList	LessonsLearnedList	FileName	ShortPath	FullPath. Use this folder for questions about specific evaluations or evaluation reports, including finding, listing, counting, filtering, or retrieving evaluations by topic, title, country, countries, region, division, year, recommendation, lesson learned, project attribute, FileName, ShortPath, or FullPath. When the user asks how many reports or evaluations match criteria, count matching records from the evaluation file if possible and cite the file. When the user asks to find evaluations about a subject or country, return the most relevant matching evaluation titles with the fields that support the match."

            - kind: SearchAndSummarizeContent
              id: GEdPMK
              autoSend: false
              variable: Global.draftResponse
              userInput: |-
                ="User question: " & Global.userQuestion & Char(10) & Char(10) &
                "Question enhancements: " & Global.executiveQuestionEnhancements & Char(10) & Char(10) &
                "Binding source-use instructions: " & Global.sourceUseInstructions & Char(10) & Char(10) &
                "Answer the user question using the applicable knowledge source and follow the binding source-use instructions. If the knowledge source does not contain enough reliable information, say so."
              additionalInstructions: |-
                You are Cidy, a UN DESA knowledge assistant. The user is asking about project evaluations, evaluation reports, recommendations, or lessons learned, topic area: {Global.topicArea}.
                Answer using ONLY the provided Project Evaluations knowledge source.
                For count questions, count matching records from the evaluation log where possible. If the source only supports an approximate count, state that limitation clearly.
                If the user asks for latest, most recent, current, newest, updated, or similar, prioritize the most recent dated source available. State the source date, year, tranche, version, or meeting date used.
                For recency-sensitive questions, reduce CONFIDENCE if the best source found is older than expected, undated, or may not reflect the current state. Use CONFIDENCE 5 only when the answer is supported by a clearly dated current/latest source; use 2-3 for older or undated latest-available sources; use 0-1 if no reliable dated source is found.
                Format your response as follows:
                ANSWER: Your detailed answer
                SOURCES: List each source document title and link used
                CONFIDENCE: Write ONLY a single number from 0 to 5 on this line, nothing else. No explanation, no asterisks, no additional text. Just the number.
              fileSearchDataSource:
                searchFilesMode:
                  kind: DoNotSearchFiles

              knowledgeSources:
                kind: SearchSpecificKnowledgeSources
                knowledgeSources:
                  - copilots_header_3141e.topic.ProjectEvaluations_4Cj3nKCE0nIEC_Ll1o8Se

