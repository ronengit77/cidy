kind: AdaptiveDialog
modelDescription: Collects user feedback and routes to ask another question, escalate, or close.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: Question
      id: question_feedback
      interruptionPolicy:
        allowInterruption: true

      variable: Topic.feedbackChoice
      prompt: Was this answer helpful?
      entity:
        kind: EmbeddedEntity
        sensitivityLevel: None
        definition:
          kind: ClosedListEntity
          items:
            - id: Yes
              displayName: Yes

            - id: No
              displayName: No

    - kind: SetVariable
      id: log_feedback_prompt
      variable: Global.transcript
      value: |
        =Global.transcript & "CIDY: " & "Was this answer helpful?" & Char(13) & Char(10) & Char(13) & Char(10)

    - kind: SetVariable
      id: log_feedback_answer
      variable: Global.transcript
      value: |
        =Global.transcript & "USER: " & Text(Topic.feedbackChoice) & Char(13) & Char(10) & Char(13) & Char(10)

    - kind: SetVariable
      id: set_user_feedback
      variable: Global.userFeedback
      value: |
        =Switch(
          Text(Topic.feedbackChoice),
          "Yes", "yes",
          "No", "no",
          "unknown"
        )

    - kind: SetVariable
      id: set_nextActionContext_feedback
      variable: Global.nextActionContext
      value: feedback

    - kind: BeginDialog
      id: goToContinueOrClose
      dialog: copilots_header_3141e.topic.ContinueOrClose

    - kind: EndDialog
      id: end_afterContinueOrClose

inputType: {}
outputType: {}
