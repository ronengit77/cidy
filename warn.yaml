kind: AdaptiveDialog
modelDescription: Prepares a warning message when confidence is low or medium, then passes to Share Response.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ConditionGroup
      id: conditionGroup_warn
      conditions:
        - id: conditionItem_low
          condition: =Global.confidenceScore < 2
          actions:
            - kind: SetVariable
              id: setVar_lowWarn
              variable: Topic.warningMessage
              value: I am sorry, I was not able to find a confident answer to your question in my knowledge sources. I am still under development and new knowledge is coming in every week. See [Cidy Knowledge Status](https://ronengit77.github.io/cidy/documentation/cidy_knowledge_control_center.html) for more information.

      elseActions:
        - kind: SetVariable
          id: setVar_medWarn
          variable: Topic.warningMessage
          value: I found some relevant information, but I am not fully certain it covers your question. Please review the sources carefully and request escalation to a colleague if uncertain. I am still under development and new knowledge is coming in every week. See [Cidy Knowledge Status](https://ronengit77.github.io/cidy/documentation/cidy_knowledge_control_center.html) for more information.

    - kind: SetVariable
      id: setVar_globalWarn
      variable: Global.warningMessage
      value: =Topic.warningMessage

    - kind: BeginDialog
      id: goToShare
      dialog: copilots_header_3141e.topic.ShareResponse

inputType: {}
outputType: {}
